name: Build Next.js

on:
  workflow_call:
    inputs:
      image:
        description: "Full image name (e.g. ghcr.io/vmedias/my-app)"
        required: true
        type: string
      tag:
        description: "Tag to apply (e.g. staging)"
        required: false
        type: string
        default: staging
      build_args:
        description: "Docker build args (multiline key=value)"
        required: false
        type: string
        default: ""

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ inputs.image }}:${{ inputs.tag }}
            ${{ inputs.image }}:sha-${{ github.sha }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
